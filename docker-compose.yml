services:
  app:
    build: .
    restart: unless-stopped
    environment:
      - IRONMAN_DB=/data/ironman.db
    volumes:
      - ironman-data:/data
    # Published only on loopback so your host's cloudflared can reach it.
    # It is never exposed directly to the internet — the tunnel handles that.
    ports:
      - "127.0.0.1:8000:8000"

  # OPTION B — run the tunnel inside this stack instead of on the host.
  # Uncomment, paste your tunnel token, and in the Cloudflare Zero Trust
  # dashboard point the public hostname at  http://app:8000  (not localhost).
  # cloudflared:
  #   image: cloudflare/cloudflared:latest
  #   restart: unless-stopped
  #   command: tunnel run
  #   environment:
  #     - TUNNEL_TOKEN=paste-your-tunnel-token-here
  #   depends_on:
  #     - app

volumes:
  ironman-data:
